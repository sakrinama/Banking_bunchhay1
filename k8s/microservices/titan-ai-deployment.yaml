apiVersion: v1
kind: Service
metadata:
  name: titan-ai
  namespace: titan-banking
  labels:
    app: titan-ai
spec:
  type: ClusterIP
  ports:
  - port: 50051
    targetPort: 50051
    name: grpc
  selector:
    app: titan-ai
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: titan-ai
  namespace: titan-banking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: titan-ai
  template:
    metadata:
      labels:
        app: titan-ai
    spec:
      containers:
      - name: titan-ai
        image: titan-ai:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 50051
          name: grpc
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command: ["/bin/grpc_health_probe", "-addr=:50051"]
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["/bin/grpc_health_probe", "-addr=:50051"]
          initialDelaySeconds: 5
          periodSeconds: 5
