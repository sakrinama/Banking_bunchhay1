apiVersion: v1
kind: Service
metadata:
  name: titan-core
  namespace: titan-banking
  labels:
    app: titan-core
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  selector:
    app: titan-core
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: titan-core
  namespace: titan-banking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: titan-core
  template:
    metadata:
      labels:
        app: titan-core
    spec:
      containers:
      - name: titan-core
        image: titan-core:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          valueFrom:
            configMapKeyRef:
              name: titan-config
              key: SPRING_PROFILES_ACTIVE
        - name: DB_HOST
          value: "postgres"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "titandb"
        - name: DB_USERNAME
          value: "postgres"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: titan-secrets
              key: DB_PASSWORD
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
        - name: AI_HOST
          value: "titan-ai"
        - name: AI_PORT
          value: "50051"
        - name: ZIPKIN_ENDPOINT
          value: "http://zipkin:9411/api/v2/spans"
        - name: SPRING_KAFKA_BOOTSTRAPSERVERS
          value: "kafka:29093"
        - name: SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL
          value: "SSL"
        - name: JAVA_OPTS
          value: "-Xmx512m -Xms256m"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        volumeMounts:
        - name: kafka-ssl
          mountPath: /app/secrets
          readOnly: true
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: kafka-ssl
        secret:
          secretName: kafka-client-ssl-secrets
          items:
          - key: core-banking.keystore.jks
            path: core-banking.keystore.jks
          - key: kafka.client.truststore.jks
            path: kafka.client.truststore.jks
