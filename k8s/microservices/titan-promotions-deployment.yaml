apiVersion: v1
kind: Service
metadata:
  name: titan-promotions
  namespace: titan-banking
  labels:
    app: titan-promotions
spec:
  type: ClusterIP
  ports:
  - port: 8083
    targetPort: 8083
    name: http
  selector:
    app: titan-promotions
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: titan-promotions
  namespace: titan-banking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: titan-promotions
  template:
    metadata:
      labels:
        app: titan-promotions
    spec:
      containers:
      - name: titan-promotions
        image: titan-promotions:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8083
          name: http
        env:
        - name: SPRING_KAFKA_BOOTSTRAPSERVERS
          value: "kafka:29093"
        - name: SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL
          value: "SSL"
        - name: DATABASE_URL
          value: "jdbc:postgresql://postgres:5432/titan_promotions"
        - name: DATABASE_USERNAME
          value: "postgres"
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: titan-secrets
              key: DB_PASSWORD
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: kafka-ssl
          mountPath: /app/secrets
          readOnly: true
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8083
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8083
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: kafka-ssl
        secret:
          secretName: kafka-client-ssl-secrets
          items:
          - key: promotions.keystore.jks
            path: promotions.keystore.jks
          - key: kafka.client.truststore.jks
            path: kafka.client.truststore.jks
