apiVersion: v1
kind: Namespace
metadata:
  name: titan-banking
  labels:
    name: titan-banking
    environment: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: titan-banking-quota
  namespace: titan-banking
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 12Gi
    limits.cpu: "12"
    limits.memory: 16Gi
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: titan-banking-limits
  namespace: titan-banking
spec:
  limits:
  - max:
      cpu: "2"
      memory: 2Gi
    min:
      cpu: "100m"
      memory: 128Mi
    default:
      cpu: "500m"
      memory: 512Mi
    defaultRequest:
      cpu: "250m"
      memory: 256Mi
    type: Container
