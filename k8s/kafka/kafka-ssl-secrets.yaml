apiVersion: v1
kind: Secret
metadata:
  name: kafka-ssl-secrets
  namespace: titan-banking
type: Opaque
data:
  # These will be populated by the deployment script from secrets/ directory
  # Base64 encoded JKS files and credentials
  kafka.server.keystore.jks: ""
  kafka.server.truststore.jks: ""
  kafka.client.truststore.jks: ""
  kafka_keystore_credentials: dGl0YW4xMjM=  # titan123
  kafka_key_credentials: dGl0YW4xMjM=  # titan123
  kafka_truststore_credentials: dGl0YW4xMjM=  # titan123
---
apiVersion: v1
kind: Secret
metadata:
  name: kafka-client-ssl-secrets
  namespace: titan-banking
type: Opaque
data:
  # Client keystores for microservices
  core-banking.keystore.jks: ""
  promotions.keystore.jks: ""
  notifications.keystore.jks: ""
