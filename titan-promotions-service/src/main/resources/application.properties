# Application
spring.application.name=titan-promotions-service
server.port=8083

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/promotiondb}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:TitanDB$ecure2026_X9z!Lp}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.spatial.dialect.postgis.PostgisPG95Dialect
spring.jpa.properties.hibernate.format_sql=true

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAPSERVERS:localhost:9092}
spring.kafka.consumer.group-id=promotions-service
spring.kafka.consumer.topic=banking.transactions.completed
spring.kafka.dlq.topic=banking.transactions.dlq
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.properties.security.protocol=PLAINTEXT

# Flyway - skip validation for local dev (migrations may differ from what's in DB)
spring.flyway.validate-on-migrate=false
spring.flyway.baseline-on-migrate=true

# Neo4j
spring.neo4j.uri=${NEO4J_URI:bolt://localhost:7687}
spring.neo4j.authentication.username=${NEO4J_USER:neo4j}
spring.neo4j.authentication.password=${NEO4J_PASSWORD:password}

# GraphQL
spring.graphql.path=/graphql
spring.graphql.websocket.path=/graphql-ws
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql

# gRPC
titan.core-banking.grpc.host=${CORE_BANKING_GRPC_HOST:localhost}
titan.core-banking.grpc.port=${CORE_BANKING_GRPC_PORT:9090}
ai.service.host=${AI_SERVICE_HOST:localhost}
ai.service.port=${AI_SERVICE_PORT:50051}
titan.ai-service.url=${AI_SERVICE_URL:http://localhost:8085}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# Logging
logging.level.root=INFO
logging.level.com.titan.promotions=DEBUG
logging.level.org.springframework.kafka=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
