# =============================================================================
# RENDER PROFILE — titan-notifications-service
# Activated via: SPRING_PROFILES_ACTIVE=render
#
# Variables marked [RENDER DASHBOARD] must be entered manually on Render.
# Variables marked [AUTO] are injected by Render from managed Postgres.
# =============================================================================

# ── Server ───────────────────────────────────────────────────────────────────
spring.application.name=titan-notifications-service
server.port=8084

# ── Database [AUTO — injected from Render managed Postgres] ─────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP — tuned for Render free tier (max 97 connections on free Postgres)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ── Kafka — Confluent Cloud ───────────────────────────────────────────────────
# [RENDER DASHBOARD] KAFKA_BOOTSTRAP_SERVERS — e.g. pkc-xxx.us-east-1.aws.confluent.cloud:9092
# [RENDER DASHBOARD] KAFKA_SASL_USERNAME     — Confluent Cloud API Key
# [RENDER DASHBOARD] KAFKA_SASL_PASSWORD     — Confluent Cloud API Secret
# ── Kafka — disabled until Confluent Cloud is configured ─────────────────────
# Set kafka.enabled=true and fill KAFKA_BOOTSTRAP_SERVERS / KAFKA_SASL_USERNAME
# / KAFKA_SASL_PASSWORD when Confluent Cloud is ready.
# While disabled, core-banking calls POST /api/notify/transaction directly.
kafka.enabled=${KAFKA_ENABLED:false}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.security.protocol=${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
spring.kafka.properties.sasl.mechanism=${KAFKA_SASL_MECHANISM:PLAIN}
# Individual username/password — read by MultiRegionKafkaConfig to build JAAS
spring.kafka.properties.sasl.jaas.username=${KAFKA_SASL_USERNAME:}
spring.kafka.properties.sasl.jaas.password=${KAFKA_SASL_PASSWORD:}

# Consumer settings
spring.kafka.consumer.group-id=titan-notifications
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.topic=banking.transactions.completed
spring.kafka.dlq.topic=banking.notifications.dlq

# ── Redis — DISABLED on Render free tier ─────────────────────────────────────
# Redis Cloud (https://redis.io/try-free) or Upstash (https://upstash.com)
# can be used — set REDIS_HOST and REDIS_PORT to enable.
spring.cache.type=none
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
management.health.redis.enabled=false

# ── Vault — DISABLED ─────────────────────────────────────────────────────────
spring.cloud.vault.enabled=false

# ── Core Banking REST URL ─────────────────────────────────────────────────────
# [RENDER DASHBOARD] CORE_BANKING_URL — URL of the titan-core-banking service on Render
titan.core-banking.url=${CORE_BANKING_URL:https://titan-core-banking.onrender.com}

# ── Email — SendGrid ──────────────────────────────────────────────────────────
# [RENDER DASHBOARD] SENDGRID_API_KEY — from https://sendgrid.com (100 emails/day free)
notification.email.enabled=true
notification.email.host=smtp.sendgrid.net
notification.email.port=587
notification.email.username=apikey
notification.email.password=${SENDGRID_API_KEY:}
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=${SENDGRID_API_KEY:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── SMS — Twilio (optional) ───────────────────────────────────────────────────
# [RENDER DASHBOARD] TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_FROM_NUMBER
notification.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
notification.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
notification.twilio.from-number=${TWILIO_FROM_NUMBER:}

# ── Provider strategy ────────────────────────────────────────────────────────
notification.provider.sms.primary=twilio
notification.provider.email.primary=sendgrid
notification.sendgrid.api-key=${SENDGRID_API_KEY:}

# ── Notification settings ────────────────────────────────────────────────────
notification.telegram.enabled=false
notification.high-value-threshold=${NOTIFICATION_HIGH_VALUE_THRESHOLD:500.00}

# Rate limiting
notification.rate-limit.sms-per-minute=3
notification.rate-limit.email-per-minute=10

# Batching
notification.batch.enabled=true
notification.batch.interval-seconds=900
notification.batch.max-size=100

# ── Resilience4j ─────────────────────────────────────────────────────────────
resilience4j.circuitbreaker.instances.smsProvider.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.smsProvider.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.emailProvider.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.emailProvider.wait-duration-in-open-state=30s

# ── Spring Batch ─────────────────────────────────────────────────────────────
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.tracing.sampling.probability=0.0

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.titan=INFO
logging.level.org.springframework.kafka=WARN
