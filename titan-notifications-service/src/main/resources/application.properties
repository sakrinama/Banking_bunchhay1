# Application
spring.application.name=titan-notifications-service
server.port=8084
spring.main.allow-bean-definition-overriding=true

# Kafka Configuration
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAPSERVERS:localhost:9092}
spring.kafka.bootstrap-servers.region2=${SPRING_KAFKA_BOOTSTRAPSERVERS_REGION2:}
spring.kafka.consumer.group-id=notification-service-group
spring.kafka.consumer.topic=banking.transactions.completed
spring.kafka.dlq.topic=banking.notifications.dlq

# Kafka SSL/TLS Configuration - PLAINTEXT for local dev
spring.kafka.security.protocol=PLAINTEXT

# Notification Settings
notification.email.enabled=true
notification.telegram.enabled=true
notification.high-value-threshold=500.00

# Provider Strategy Configuration
notification.provider.sms.primary=twilio
notification.provider.sms.secondary=sns
notification.provider.email.primary=sendgrid
notification.provider.email.secondary=ses

# Provider API Keys (externalize in production)
notification.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
notification.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
notification.twilio.from-number=${TWILIO_FROM_NUMBER:}
notification.sendgrid.api-key=${SENDGRID_API_KEY:}

# Task 6: Email Configuration
notification.email.host=smtp.sendgrid.net
notification.email.port=587
notification.email.username=apikey
notification.email.password=${SENDGRID_API_KEY:}

# Task 8: Vault Configuration
spring.cloud.vault.enabled=${VAULT_ENABLED:false}
spring.cloud.vault.uri=${VAULT_URI:http://localhost:8200}
spring.cloud.vault.token=${VAULT_TOKEN:}
notification.vault.apns-path=secret/apns
notification.vault.fcm-path=secret/fcm

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.smsProvider.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.smsProvider.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.smsProvider.sliding-window-size=10
resilience4j.circuitbreaker.instances.emailProvider.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.emailProvider.wait-duration-in-open-state=30s

# Spring Retry
spring.retry.max-attempts=5
spring.retry.initial-interval=1000
spring.retry.multiplier=2
spring.retry.max-interval=10000

# Rate Limiting
notification.rate-limit.sms-per-minute=3
notification.rate-limit.email-per-minute=10

# Batching
notification.batch.enabled=true
notification.batch.interval-seconds=900
notification.batch.max-size=100

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# PostgreSQL - use existing dev DB
spring.datasource.url=jdbc:postgresql://localhost:5432/titandb
spring.datasource.username=postgres
spring.datasource.password=TitanDB$ecure2026_X9z!Lp
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Task 9: Spring Batch
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# Logging
logging.level.root=INFO
logging.level.com.titan.notifications=DEBUG
logging.level.org.springframework.kafka=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
