services:
  - type: pserv
    name: titan-ai-service
    runtime: docker
    dockerfilePath: ./titan-ai-service/Dockerfile
    dockerContext: ./titan-ai-service
    plan: free

    envVars:
      - key: GRPC_PORT
        value: "50051"
      - key: MAX_WORKERS
        value: "10"
      - key: LOG_LEVEL
        value: "INFO"
      - key: PYTHONUNBUFFERED
        value: "1"

      # ── Risk Thresholds ──────────────────────────────────
      # < 1,000       → LOW     / ALLOW
      # < 10,000      → MEDIUM  / REVIEW
      # < 100,000     → HIGH    / REVIEW
      # >= 100,000    → BLOCKED / BLOCK
      - key: RISK_LOW_MAX_AMOUNT
        value: "1000"
      - key: RISK_MEDIUM_MAX_AMOUNT
        value: "10000"
      - key: RISK_HIGH_MAX_AMOUNT
        value: "100000"

      # ── Risk Scores ──────────────────────────────────────
      - key: RISK_SCORE_LOW
        value: "10"
      - key: RISK_SCORE_MEDIUM
        value: "50"
      - key: RISK_SCORE_HIGH
        value: "85"
      - key: RISK_SCORE_BLOCKED
        value: "100"
