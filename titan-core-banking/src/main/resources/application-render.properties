# ==========================================
# RENDER PROFILE - titan-core-banking
# Activated via SPRING_PROFILES_ACTIVE=render
# ==========================================

# Database (env vars injected by Render from managed Postgres)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP - tuned for Render free tier (limited connections)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis - DISABLED (Render free tier no longer offers managed Redis)
# App uses in-memory fallback (no caching) instead
spring.cache.type=none
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Exclude Redis from health check
management.health.redis.enabled=false

# JWT
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.issuer=titan-banking
app.jwt.audience=titan-api
app.jwt.expiration-ms=86400000

# Kafka - DISABLED on Render free tier (no managed Kafka)
kafka.enabled=false
spring.kafka.bootstrap-servers=localhost:9092

# gRPC AI - points to titan-ai-service on Railway (or Render private service)
titan.ai.host=${AI_HOST:localhost}
titan.ai.port=${AI_PORT:50051}
# Deadline: gRPC call must complete within 3 seconds or fail fast to fallback
titan.ai.deadline-ms=${AI_DEADLINE_MS:3000}
grpc.client.riskEngineClient.address=static://${AI_HOST:localhost}:${AI_PORT:50051}
grpc.client.riskEngineClient.negotiationType=PLAINTEXT
# Local fallback block limit (used when AI service is unreachable)
titan.ai.local.block.limit=${AI_LOCAL_BLOCK_LIMIT:100000}

# Resilience4j - trip fast so transfer doesn't hang waiting for dead AI service
resilience4j.circuitbreaker.instances.risk-engine.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.risk-engine.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.risk-engine.sliding-window-size=4
resilience4j.circuitbreaker.instances.risk-engine.permitted-number-of-calls-in-half-open-state=1
resilience4j.timelimiter.instances.risk-engine.timeout-duration=3s

# Observability - tracing off (no Zipkin on free tier)
management.tracing.sampling.probability=0.0
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Spring Batch
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# ── APNs Push Notifications ───────────────────────────────
# Get these from Apple Developer Portal → Keys → Create a key → Enable APNs
apns.key-id=${APNS_KEY_ID:}
apns.team-id=${APNS_TEAM_ID:}
apns.bundle-id=${APNS_BUNDLE_ID:com.titan.banking}
apns.sandbox=${APNS_SANDBOX:true}
# Paste full .p8 file contents (replace newlines with \n in Render env var)
apns.private-key=${APNS_PRIVATE_KEY:}

# Logging
spring.application.name=titan-core-banking
logging.level.root=WARN
logging.level.com.titan=INFO

# Server
server.port=8080
