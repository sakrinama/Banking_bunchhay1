# ============================================================================
# RENDER PROFILE — titan-core-banking
# Activated via: SPRING_PROFILES_ACTIVE=render
#
# Every ${ENV_VAR:default} here maps to an editable input box in the
# Render dashboard (render.yaml sets them with sync: false).
# ============================================================================

# ── DATABASE ────────────────────────────────────────────────────────────────
# Injected automatically by Render from the managed Postgres database.
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP — tuned for Render free tier (limited connections)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── FLYWAY ──────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ── JPA ─────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── REDIS (disabled on Render free tier) ───────────────────────────────────
# Set REDIS_HOST / REDIS_PORT in the dashboard to enable Redis.
spring.cache.type=none
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
management.health.redis.enabled=false

# ── JWT ─────────────────────────────────────────────────────────────────────
# APP_JWT_SECRET is auto-generated by Render on first deploy.
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.issuer=titan-banking
app.jwt.audience=titan-api
app.jwt.expiration-ms=86400000

# ── KAFKA ───────────────────────────────────────────────────────────────────
# Set KAFKA_ENABLED=true and KAFKA_BOOTSTRAP_SERVERS in the dashboard
# to connect to an external Kafka cluster (e.g. Confluent Cloud).
kafka.enabled=${KAFKA_ENABLED:false}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=1
spring.kafka.producer.retries=3
spring.kafka.security.protocol=PLAINTEXT

# Kafka Topics
kafka.topic.transaction-completed=banking.transactions.completed
kafka.topic.account-created=banking.accounts.created
kafka.topic.account-updated=banking.accounts.updated
kafka.topic.dlq=banking.transactions.dlq

# ── AI / gRPC RISK ENGINE ────────────────────────────────────────────────────
# AI_HOST — hostname of titan-ai-service (Render Private Service or external)
titan.ai.host=${AI_HOST:localhost}
titan.ai.port=${AI_PORT:50051}
titan.ai.deadline-ms=${AI_DEADLINE_MS:3000}
titan.ai.local.block.limit=${AI_LOCAL_BLOCK_LIMIT:100000}
grpc.client.riskEngineClient.address=static://${AI_HOST:localhost}:${AI_PORT:50051}
grpc.client.riskEngineClient.negotiationType=PLAINTEXT

# Resilience4j — trip fast so transfers don't hang waiting for a dead AI service
resilience4j.circuitbreaker.instances.risk-engine.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.risk-engine.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.risk-engine.sliding-window-size=4
resilience4j.circuitbreaker.instances.risk-engine.permitted-number-of-calls-in-half-open-state=1
resilience4j.timelimiter.instances.risk-engine.timeout-duration=3s

# ── APNs PUSH NOTIFICATIONS ─────────────────────────────────────────────────
# Get Key ID, Team ID, and .p8 file from Apple Developer Portal → Keys.
apns.key-id=${APNS_KEY_ID:}
apns.team-id=${APNS_TEAM_ID:}
apns.bundle-id=${APNS_BUNDLE_ID:com.titan.banking}
apns.sandbox=${APNS_SANDBOX:true}
# Paste the full .p8 contents into APNS_PRIVATE_KEY in the Render dashboard.
# Replace actual newlines with \n so it fits in a single env var line.
apns.private-key=${APNS_PRIVATE_KEY:}

# ── QR CODE PAYMENTS ─────────────────────────────────────────────────────────
# QR_DEFAULT_TTL_MINUTES — how long a generated QR is valid (default 15 min)
qr.default.ttl.minutes=${QR_DEFAULT_TTL_MINUTES:15}
# QR_MAX_AMOUNT — maximum amount allowed per QR payment
qr.max.amount=${QR_MAX_AMOUNT:1000000.00}

# ── OBSERVABILITY ────────────────────────────────────────────────────────────
# Set TRACING_SAMPLE_RATE=1.0 and ZIPKIN_ENDPOINT to enable distributed tracing.
management.tracing.sampling.probability=${TRACING_SAMPLE_RATE:0.0}
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── SPRING BATCH ─────────────────────────────────────────────────────────────
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# ── CBDC BRIDGE (optional) ───────────────────────────────────────────────────
cbdc.node.url=${CBDC_NODE_URL:http://localhost:8545}
cbdc.contract.address=${CBDC_CONTRACT_ADDRESS:0x0000000000000000000000000000000000000001}
cbdc.token.symbol=${CBDC_TOKEN_SYMBOL:eKHR}

# ── DEAD MAN'S SWITCH ────────────────────────────────────────────────────────
dms.enabled=${DMS_ENABLED:true}
dms.executive.public-key-pem=${DMS_EXECUTIVE_PUBLIC_KEY:}

# ── FX DATA ──────────────────────────────────────────────────────────────────
fx.data.url=${FX_DATA_URL:https://api.frankfurter.app}

# ── AIOPS ────────────────────────────────────────────────────────────────────
aiops.prometheus.url=${PROMETHEUS_URL:http://localhost:9090}
aiops.k8s.api.url=${K8S_API_URL:https://kubernetes.default.svc}
aiops.scale.namespace=titan-banking
aiops.scale.deployment=titan-promotions-service
aiops.tps.threshold=500
aiops.scale.max-replicas=20

# ── LOGGING ──────────────────────────────────────────────────────────────────
spring.application.name=titan-core-banking
logging.level.root=WARN
logging.level.com.titan=INFO

# ── SERVER ───────────────────────────────────────────────────────────────────
server.port=8080
