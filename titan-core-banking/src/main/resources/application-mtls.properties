# ==========================================
# TASK 3: Mutual TLS (mTLS) Configuration
# ==========================================

# Enable SSL/TLS
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore/titan-core.p12
server.ssl.key-store-password=${KEYSTORE_PASSWORD:changeit}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=titan-core

# Enable mTLS (client certificate authentication)
server.ssl.client-auth=need
server.ssl.trust-store=classpath:keystore/truststore.p12
server.ssl.trust-store-password=${TRUSTSTORE_PASSWORD:changeit}
server.ssl.trust-store-type=PKCS12

# TLS Protocol
server.ssl.protocol=TLS
server.ssl.enabled-protocols=TLSv1.3
