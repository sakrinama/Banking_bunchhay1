# Development Profile Configuration (for local IntelliJ runs)
server.port=8080

# Use localhost instead of Docker hostnames
spring.datasource.url=jdbc:postgresql://localhost:5432/titandb
spring.datasource.password=TitanDB$ecure2026_X9z!Lp
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Kafka - use PLAINTEXT port (no SSL for local dev)
spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.security.protocol=PLAINTEXT
spring.kafka.ssl.trust-store-location=
spring.kafka.ssl.key-store-location=

# Flyway - skip checksum validation on dev (migrations may have been edited)
spring.flyway.validate-on-migrate=false
# Skip the partitioning migration - it's production-only (destructive table restructure)
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=false

# Disable batch scheduling for local development
spring.batch.job.enabled=false
spring.scheduling.enabled=false
