# 1. ?? DATABASE CONNECTION
# Connects to 'titan-db-prod' container on port 5432
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:titandb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:TitanDB$ecure2026_X9z!Lp}
# 6. SECURITY (JWT) - Shared secret (must match gateway)
app.jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
app.jwt.issuer=titan-banking
app.jwt.audience=titan-api
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. ? DATABASE MIGRATION (Flyway)
# ✅ TITAN STANDARD: Enable Flyway for database migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# 3. ?? JPA / HIBERNATE (THE FIXER)
# ? 'update' will keep data between restarts.
# Changed from 'create-drop' to preserve user data and accounts.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 4. ? REDIS CACHE
# Connects to 'titan-redis-prod' container on port 6379
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# 5. ? AI RISK ENGINE (gRPC)
# Connects to 'titan-ai' container on port 50051
titan.ai.host=${AI_HOST:localhost}
titan.ai.port=${AI_PORT:50051}
grpc.client.riskEngineClient.address=static://${AI_HOST:localhost}:${AI_PORT:50051}
grpc.client.riskEngineClient.negotiationType=PLAINTEXT


app.jwt.expiration-ms=86400000

server.port=8080

# ? RESILIENCE4J (CIRCUIT BREAKER)
# Protects the app if the Python AI service goes down
resilience4j.circuitbreaker.instances.risk-engine.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.risk-engine.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.risk-engine.sliding-window-size=10

# ? RESILIENCE4J (DB RETRY)
resilience4j.retry.instances.db.max-attempts=3
resilience4j.retry.instances.db.wait-duration=500ms
resilience4j.retry.instances.db.retry-exceptions=org.springframework.dao.TransientDataAccessException,org.springframework.dao.DataAccessResourceFailureException,org.springframework.jdbc.CannotGetJdbcConnectionException

# ? OBSERVABILITY (Zipkin Tracing) - DISABLED for local dev
# Connects to 'titan-zipkin' container on port 9411
management.tracing.sampling.probability=0.0
#management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
management.endpoints.web.exposure.include=health,info

# ? LOGGING PATTERN
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
spring.application.name=titan-core-banking

# ?? SPRING BATCH
# Ensures Batch tables are created automatically
spring.batch.jdbc.initialize-schema=always
# Disable auto-run on startup (scheduled jobs will run it)
spring.batch.job.enabled=false

# 7. ? KAFKA EVENT STREAMING
# Dev: localhost:9092 (PLAINTEXT). Override with KAFKA_BOOTSTRAP_SERVERS env var for prod.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=1
spring.kafka.producer.retries=3
spring.kafka.producer.properties.max.block.ms=5000
spring.kafka.producer.properties.request.timeout.ms=5000
spring.kafka.producer.properties.linger.ms=10
spring.kafka.producer.properties.batch.size=16384
spring.kafka.producer.properties.compression.type=lz4

# Kafka Consumer Configuration
spring.kafka.consumer.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# 8. KAFKA SSL — disabled for local dev (PLAINTEXT). Re-enable for prod.
spring.kafka.security.protocol=PLAINTEXT
