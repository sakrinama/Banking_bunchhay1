# ==========================================
# TASK 5: OpenTelemetry Configuration
# ==========================================

# OpenTelemetry Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans

# Expose trace IDs in logs
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# SQL tracing with OpenTelemetry
spring.datasource.url=jdbc:otel:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:titandb}
spring.datasource.driver-class-name=io.opentelemetry.instrumentation.jdbc.OpenTelemetryDriver

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus,trace
management.endpoint.health.show-details=always
