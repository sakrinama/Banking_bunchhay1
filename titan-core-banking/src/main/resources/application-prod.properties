# HikariCP Production Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.pool-name=TitanCoreHikariPool

# Database Connection
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:titandb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:mysecretpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=11
spring.flyway.locations=classpath:db/migration

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# gRPC AI
titan.ai.host=${AI_HOST:localhost}
titan.ai.port=${AI_PORT:50051}
grpc.client.riskEngineClient.address=static://${AI_HOST:localhost}:${AI_PORT:50051}
grpc.client.riskEngineClient.negotiationType=PLAINTEXT

# JWT
app.jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
app.jwt.issuer=titan-banking
app.jwt.audience=titan-api
app.jwt.expiration-ms=86400000

# Server
server.port=8080

# Resilience4j
resilience4j.circuitbreaker.instances.risk-engine.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.risk-engine.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.risk-engine.sliding-window-size=10

resilience4j.retry.instances.db.max-attempts=3
resilience4j.retry.instances.db.wait-duration=500ms
resilience4j.retry.instances.db.retry-exceptions=org.springframework.dao.TransientDataAccessException,org.springframework.dao.DataAccessResourceFailureException,org.springframework.jdbc.CannotGetJdbcConnectionException

# Observability
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# Logging
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
spring.application.name=titan-core-banking

# Spring Batch
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

