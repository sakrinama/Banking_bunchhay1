plugins {
    id 'java'
    id 'org.springframework.boot' version '3.2.3'
    id 'io.spring.dependency-management' version '1.1.4'
    id 'com.google.protobuf' version '0.9.4'
}

group = 'com.titan'
version = '0.0.1-SNAPSHOT'

// Java 21 LTS Configuration
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

// Disable plain JAR generation (only keep the boot JAR)
tasks.named('jar') {
    enabled = false
}

repositories {
    mavenCentral()
}

dependencies {
    // GraphQL Subgraph + WebSocket Subscriptions
    implementation 'org.springframework.boot:spring-boot-starter-graphql'
    implementation 'org.springframework.boot:spring-boot-starter-websocket'

    // 1. Core & Web
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-validation'

    // 2. SECURITY & JWT
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'io.jsonwebtoken:jjwt-api:0.11.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.11.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.11.5'

    // 3. REDIS
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'

    // 4. Database
    runtimeOnly 'org.postgresql:postgresql'
    implementation 'org.flywaydb:flyway-core'

    // 5. Resilience4j
    implementation 'io.github.resilience4j:resilience4j-spring-boot3:2.1.0'
    implementation 'org.springframework.boot:spring-boot-starter-aop'

    // 6. gRPC
    implementation 'net.devh:grpc-client-spring-boot-starter:3.1.0.RELEASE'
    implementation 'io.grpc:grpc-stub:1.62.2'
    implementation 'io.grpc:grpc-protobuf:1.62.2'
    implementation 'javax.annotation:javax.annotation-api:1.3.2'

    // 7. Observability
    implementation 'io.micrometer:micrometer-tracing-bridge-brave'
    implementation 'io.zipkin.reporter2:zipkin-reporter-brave'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.3.0'

    // 8. Batch & PDF
    implementation 'org.springframework.boot:spring-boot-starter-batch'

    // 📲 QR Code Generation (ZXing)
    implementation 'com.google.zxing:core:3.5.3'
    implementation 'com.google.zxing:javase:3.5.3'
    testImplementation 'org.springframework.batch:spring-batch-test'
    implementation 'com.github.librepdf:openpdf:1.3.30'

    // 9. Kafka Event Streaming
    implementation 'org.springframework.kafka:spring-kafka'
    testImplementation 'org.springframework.kafka:spring-kafka-test'
    
    // 10. Property-Based Testing (jqwik)
    testImplementation 'net.jqwik:jqwik:1.8.2'

    // ✅ 11. TOOLS - LOMBOK (Fixed for Java 21+)
    compileOnly 'org.projectlombok:lombok:1.18.36'
    annotationProcessor 'org.projectlombok:lombok:1.18.36'
    testCompileOnly 'org.projectlombok:lombok:1.18.36'
    testAnnotationProcessor 'org.projectlombok:lombok:1.18.36'

    // Tests
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation platform('org.testcontainers:testcontainers-bom:1.19.7')
    testImplementation 'org.testcontainers:junit-jupiter'
    testImplementation 'org.testcontainers:postgresql'

}

sourceSets {
    main {
        java {
            srcDir 'build/generated/source/proto/main/grpc'
            srcDir 'build/generated/source/proto/main/java'
        }
    }
}

protobuf {
    protoc {
        artifact = "com.google.protobuf:protoc:3.25.1"
    }
    plugins {
        grpc {
            // 🛠️ SENIOR FIX: Select correct macOS architecture for protoc-gen-grpc-java.
            if (System.getProperty("os.name").toLowerCase().contains("mac")) {
                def arch = System.getProperty("os.arch").toLowerCase()
                if (arch.contains("aarch64") || arch.contains("arm64")) {
                    artifact = 'io.grpc:protoc-gen-grpc-java:1.62.2:osx-aarch_64'
                } else {
                    artifact = 'io.grpc:protoc-gen-grpc-java:1.62.2:osx-x86_64'
                }
            } else {
                artifact = 'io.grpc:protoc-gen-grpc-java:1.62.2'
            }
        }
    }
    generateProtoTasks {
        all()*.plugins {
            grpc {}
        }
    }
}

// ✅ 12. COMPILER BYPASS (Safety net for Lombok)
tasks.withType(JavaCompile) {
    options.fork = true
    options.compilerArgs += [
            '--add-opens=jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED',
            '--add-opens=jdk.compiler/com.sun.tools.javac.comp=ALL-UNNAMED',
            '--add-opens=jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED',
            '--add-opens=jdk.compiler/com.sun.tools.javac.main=ALL-UNNAMED',
            '--add-opens=jdk.compiler/com.sun.tools.javac.model=ALL-UNNAMED',
            '--add-opens=jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED',
            '--add-opens=jdk.compiler/com.sun.tools.javac.processing=ALL-UNNAMED',
            '--add-opens=jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED',
            '--add-opens=jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED'
    ]
}
// 🛠️ SENIOR AUTOMATION: Auto-fix permissions for protoc plugins
tasks.withType(com.google.protobuf.gradle.GenerateProtoTask).configureEach { task ->
    def pluginPaths = []
    task.plugins.configureEach { plugin ->
        if (plugin.hasProperty("path") && plugin.path) {
            pluginPaths << plugin.path
        }
    }
    task.doFirst {
        pluginPaths.each { path ->
            if (path.endsWith(".exe") && !file(path).canExecute()) {
                println "🔧 TitanFix: Granting +x permission to ${path}"
                file(path).setExecutable(true)
            }
        }
    }
}
