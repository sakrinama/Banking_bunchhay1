services:
  - type: web
    name: titan-core-banking
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DB_HOST
        fromDatabase:
          name: titan-core-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: titan-core-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: titan-core-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: titan-core-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: titan-core-db
          property: password
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: titan-core-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          name: titan-core-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: titan-core-redis
          type: redis
          property: port
      - key: APP_JWT_SECRET
        generateValue: true
      - key: JAVA_OPTS
        value: "-Xmx400m -Xms200m"

databases:
  - name: titan-core-db
    plan: free
    databaseName: titandb
    user: titanuser

  - type: redis
    name: titan-core-redis
    plan: free
    ipAllowList: []
