# =============================================================================
# render.yaml — titan-core-banking
#
# HOW TO USE:
#   1. Push this file to your repo — Render detects it automatically.
#   2. Go to Render Dashboard → titan-core-banking → Environment.
#   3. Every variable marked "sync: false" appears as an EDITABLE INPUT BOX.
#   4. Fill in the values, click "Save Changes", then "Manual Deploy".
#
# Variables that Render injects automatically (fromDatabase / generateValue)
# do NOT need to be typed in — Render fills them for you.
# =============================================================================

services:
  - type: web
    name: titan-core-banking
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health

    envVars:

      # ── SPRING ──────────────────────────────────────────────────────────────
      - key: SPRING_PROFILES_ACTIVE
        value: render

      # ── DATABASE (auto-injected by Render from managed Postgres) ────────────
      - key: DB_HOST
        fromDatabase:
          name: titan-core-db
          property: host

      - key: DB_PORT
        fromDatabase:
          name: titan-core-db
          property: port

      - key: DB_NAME
        fromDatabase:
          name: titan-core-db
          property: database

      - key: DB_USERNAME
        fromDatabase:
          name: titan-core-db
          property: user

      - key: DB_PASSWORD
        fromDatabase:
          name: titan-core-db
          property: password

      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: titan-core-db
          property: connectionString

      # ── JWT (auto-generated by Render on first deploy) ───────────────────────
      - key: APP_JWT_SECRET
        generateValue: true

      # ── JVM ─────────────────────────────────────────────────────────────────
      # 📦 INPUT BOX — Adjust memory limits for your Render plan
      - key: JAVA_OPTS
        sync: false
        value: "-Xmx400m -Xms200m"

      # ── AI / gRPC RISK ENGINE ───────────────────────────────────────────────
      # 📦 INPUT BOX — Hostname of titan-ai-service on Render (Private Service)
      - key: AI_HOST
        sync: false
        value: "titan-ai-service"

      # 📦 INPUT BOX — gRPC port (default 50051)
      - key: AI_PORT
        sync: false
        value: "50051"

      # 📦 INPUT BOX — gRPC deadline in milliseconds before fallback triggers
      - key: AI_DEADLINE_MS
        sync: false
        value: "3000"

      # 📦 INPUT BOX — Local block limit when AI service is unreachable
      - key: AI_LOCAL_BLOCK_LIMIT
        sync: false
        value: "100000"

      # ── APNS PUSH NOTIFICATIONS ─────────────────────────────────────────────
      # 📦 INPUT BOX — 10-character Key ID from Apple Developer Portal
      - key: APNS_KEY_ID
        sync: false
        value: ""

      # 📦 INPUT BOX — 10-character Team ID from Apple Developer Portal
      - key: APNS_TEAM_ID
        sync: false
        value: ""

      # 📦 INPUT BOX — App Bundle ID (e.g. com.titan.banking)
      - key: APNS_BUNDLE_ID
        sync: false
        value: "com.titan.banking"

      # 📦 INPUT BOX — true = sandbox (dev), false = production
      - key: APNS_SANDBOX
        sync: false
        value: "true"

      # 📦 INPUT BOX — Full contents of your Apple .p8 private key file
      #   Replace newlines with \n when pasting into Render
      - key: APNS_PRIVATE_KEY
        sync: false
        value: ""

      # ── QR CODE PAYMENTS ────────────────────────────────────────────────────
      # 📦 INPUT BOX — Default TTL (minutes) for generated QR codes
      - key: QR_DEFAULT_TTL_MINUTES
        sync: false
        value: "15"

      # 📦 INPUT BOX — Maximum allowed QR payment amount
      - key: QR_MAX_AMOUNT
        sync: false
        value: "1000000.00"

      # ── OBSERVABILITY ────────────────────────────────────────────────────────
      # 📦 INPUT BOX — Zipkin endpoint (leave empty to disable tracing)
      - key: ZIPKIN_ENDPOINT
        sync: false
        value: ""

      # 📦 INPUT BOX — Tracing sample rate: 0.0 = off, 1.0 = 100%
      - key: TRACING_SAMPLE_RATE
        sync: false
        value: "0.0"

      # ── KAFKA (disabled on Render free tier) ────────────────────────────────
      # 📦 INPUT BOX — Kafka bootstrap servers (e.g. from Confluent Cloud)
      - key: KAFKA_BOOTSTRAP_SERVERS
        sync: false
        value: "localhost:9092"

      # 📦 INPUT BOX — Set to true to enable Kafka event streaming
      - key: KAFKA_ENABLED
        sync: false
        value: "false"

      # ── CBDC BRIDGE (optional) ──────────────────────────────────────────────
      # 📦 INPUT BOX — Ethereum-compatible RPC node URL
      - key: CBDC_NODE_URL
        sync: false
        value: "http://localhost:8545"

      # 📦 INPUT BOX — Deployed CBDC smart contract address
      - key: CBDC_CONTRACT_ADDRESS
        sync: false
        value: "0x0000000000000000000000000000000000000001"

      # 📦 INPUT BOX — CBDC token symbol (e.g. eKHR)
      - key: CBDC_TOKEN_SYMBOL
        sync: false
        value: "eKHR"

      # ── DEAD MAN'S SWITCH ────────────────────────────────────────────────────
      # 📦 INPUT BOX — Set to false to disable the emergency lockdown switch
      - key: DMS_ENABLED
        sync: false
        value: "true"

      # 📦 INPUT BOX — RSA public key PEM for executive unlock (optional)
      - key: DMS_EXECUTIVE_PUBLIC_KEY
        sync: false
        value: ""

      # ── REDIS (disabled on Render free tier) ────────────────────────────────
      # 📦 INPUT BOX — Redis host (set if using external Redis)
      - key: REDIS_HOST
        sync: false
        value: "localhost"

      # 📦 INPUT BOX — Redis port
      - key: REDIS_PORT
        sync: false
        value: "6379"

      # ── FX DATA ─────────────────────────────────────────────────────────────
      # 📦 INPUT BOX — FX rate data API URL
      - key: FX_DATA_URL
        sync: false
        value: "https://api.frankfurter.app"

      # ── AIOPS (optional Kubernetes auto-scaler) ──────────────────────────────
      # 📦 INPUT BOX — Prometheus URL for AIOps metrics
      - key: PROMETHEUS_URL
        sync: false
        value: "http://localhost:9090"

      # 📦 INPUT BOX — Kubernetes API server URL
      - key: K8S_API_URL
        sync: false
        value: "https://kubernetes.default.svc"

databases:
  - name: titan-core-db
    plan: free
    databaseName: titandb
    user: titanuser
